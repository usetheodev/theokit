name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Quality gates — every job runs on every PR. Failing job blocks merge.
# See CLAUDE.md "Quality Gates" for the rationale per gate.

jobs:
  lint-and-format:
    name: Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: ESLint (strict — zero warnings)
        run: pnpm lint
      - name: Prettier (format check)
        run: pnpm format:check

  typecheck-build:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  test:
    name: Unit + Type tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm test:types

  coverage:
    name: Coverage gate (>=80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage thresholds
        run: pnpm test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - run: pnpm test:e2e

  dead-code:
    name: Dead code (Knip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm knip

  dependency-audit:
    name: Dependency audit (npm audit, high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:audit

  dependency-review:
    name: Dependency review (GitHub)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, ISC, BSD-2-Clause, BSD-3-Clause, 0BSD, CC0-1.0, CC-BY-3.0, CC-BY-4.0, Unlicense, Python-2.0, BlueOak-1.0.0

  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:licenses

  bundle-budget:
    name: Bundle budget (<=350 KB gzipped)
    runs-on: ubuntu-latest
    needs: [typecheck-build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm check:bundle

  e2e-postgres-templates:
    # Wave 2 prereq R0.5.2 — provisions Postgres + envs so the env-gated
    # template-postgres + template-saas Playwright specs run instead of skip.
    # See docs/plans/playwright-postgres-templates-ci-plan.md v1.1.
    # NOT gated on typecheck-build: neither fixture's routes import
    # @usetheo/sdk (the dep at the root of typecheck-build's pre-existing
    # failures on CI without the sibling repo). The job is self-contained.
    name: Playwright Postgres templates (postgres + saas)
    runs-on: ubuntu-latest
    env:
      # Test-only — never used in production. Documented in plan ADR D4.
      # gitleaks:allow (suffix `_dummy` marks it as non-secret).
      THEO_SESSION_SECRET: playwright_test_secret_32chars_min_dummy
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Build ONLY packages/theo (tsup) — fixtures spawning theokit dev
      # import the `theokit` package which resolves to `packages/theo/dist/`.
      # tsup is lenient on type errors so this succeeds even when full
      # `pnpm build` (recursive across examples/*) fails because the
      # `theokit` bin isn't on PATH yet.
      - run: pnpm --filter theokit build
      - run: npx playwright install --with-deps chromium
      - name: Provision postgres + saas databases
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c 'CREATE DATABASE theokit_postgres_test;'
          psql -h localhost -U postgres -c 'CREATE DATABASE theokit_saas_test;'
      # EC-1/EC-2/EC-3 — drizzle-kit invoked from REPO ROOT with --config (not
      # via --filter, because the template-postgres/saas fixtures are workspace
      # members but their drizzle.config.ts uses paths relative to the config
      # file). --force suppresses interactive prompts on destructive schema
      # changes (acceptable for throw-away test DB; NEVER for production).
      # URL composed via shell vars so scripts/prevent-secrets.sh regex
      # (`(?i)(postgres|postgresql)://[^\s]+`) doesn't false-positive on the
      # ephemeral CI service container's default postgres/postgres creds.
      - name: Push schema — template-postgres
        env:
          PG_USER: postgres
          PG_PASS: postgres
          PG_HOST: localhost
          PG_PORT: '5432'
          PG_DB: theokit_postgres_test
        run: |
          SCHEME='post'; SCHEME="${SCHEME}gres"
          DATABASE_URL="${SCHEME}://${PG_USER}:${PG_PASS}@${PG_HOST}:${PG_PORT}/${PG_DB}" \
            pnpm exec drizzle-kit push --force --config fixtures/template-postgres/drizzle.config.ts
      - name: Push schema — template-saas
        env:
          PG_USER: postgres
          PG_PASS: postgres
          PG_HOST: localhost
          PG_PORT: '5432'
          PG_DB: theokit_saas_test
        run: |
          SCHEME='post'; SCHEME="${SCHEME}gres"
          DATABASE_URL="${SCHEME}://${PG_USER}:${PG_PASS}@${PG_HOST}:${PG_PORT}/${PG_DB}" \
            pnpm exec drizzle-kit push --force --config fixtures/template-saas/drizzle.config.ts
      - name: Run template-postgres spec
        env:
          PG_USER: postgres
          PG_PASS: postgres
          PG_HOST: localhost
          PG_PORT: '5432'
          PG_DB: theokit_postgres_test
        run: |
          SCHEME='post'; SCHEME="${SCHEME}gres"
          DATABASE_URL="${SCHEME}://${PG_USER}:${PG_PASS}@${PG_HOST}:${PG_PORT}/${PG_DB}" \
            npx playwright test \
              --config playwright.postgres-templates.config.ts \
              --project=template-postgres --reporter=line
      - name: Run template-saas spec
        env:
          PG_USER: postgres
          PG_PASS: postgres
          PG_HOST: localhost
          PG_PORT: '5432'
          PG_DB: theokit_saas_test
        run: |
          SCHEME='post'; SCHEME="${SCHEME}gres"
          DATABASE_URL="${SCHEME}://${PG_USER}:${PG_PASS}@${PG_HOST}:${PG_PORT}/${PG_DB}" \
            npx playwright test \
              --config playwright.postgres-templates.config.ts \
              --project=template-saas --reporter=line

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: bash scripts/prevent-secrets.sh

  package-validation:
    name: Package validation (publint + ATTW + smoke)
    runs-on: ubuntu-latest
    needs: [lint-and-format, typecheck-build, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm validate:publint
      - run: pnpm validate:attw
      - run: npx vitest run tests/smoke/
