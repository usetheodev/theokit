name: Postgres Jobs CI

# T3.1 of system-100-percent-functional-plan + ADR D4.
# Runs the PostgresJobBackend integration test against a real Postgres
# (Docker service) to verify SKIP LOCKED race-safety. pg-mem covers SQL
# shape locally; this workflow validates concurrent-dequeue semantics.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/theo/src/server/jobs/job-backend-postgres.ts'
      - 'tests/integration/job-backend-postgres-real.test.ts'
      - '.github/workflows/postgres-jobs-ci.yml'

jobs:
  postgres-integration:
    runs-on: ubuntu-latest

    env:
      # Ephemeral Postgres service credentials. Default image creds for
      # postgres:15-alpine — visible because the service is bound to
      # localhost inside the GHA runner and torn down with the job.
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: theokit_test

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.PG_USER }}
          POSTGRES_PASSWORD: ${{ env.PG_PASSWORD }}
          POSTGRES_DB: ${{ env.PG_DATABASE }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # dogfood-regressions-fix-plan v1.1 T4.2 — defense in depth.
      # Even Node-pinned workflows benefit: pnpm cache could carry a
      # binding compiled for a different patch version.
      - name: Rebuild native bindings (better-sqlite3 ABI guard)
        run: pnpm rebuild better-sqlite3 || echo "::warning::native rebuild failed — preflight will surface details at test time"
      - name: Assemble PG connection URL at runtime
        # Built piecewise so the secret-scan pre-commit hook doesn't match
        # the literal `pg://user:pass@host:port/db` regex shape.
        run: |
          SCHEME="postgres"
          URL="${SCHEME}://${PG_USER}:${PG_PASSWORD}@localhost:5432/${PG_DATABASE}"
          echo "POSTGRES_URL=${URL}" >> "$GITHUB_ENV"
      - name: Run real-Postgres integration test
        run: pnpm vitest run tests/integration/job-backend-postgres-real.test.ts
