name: Bug report
description: Something is broken or behaves unexpectedly in TheoKit.
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        Before opening: search existing issues first. If you find a duplicate, please add a comment with your context instead of opening a new one.
  - type: input
    id: theokit_version
    attributes:
      label: TheoKit version
      description: "Output of `npx theokit info` (top line) or contents of your `package.json` `theokit` entry."
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: repro_repo
    attributes:
      label: Reproduction repository
      description: "A minimal GitHub repo that reproduces the bug. The smallest possible repro shortens triage by hours."
      placeholder: "https://github.com/your-handle/theokit-bug-repro"
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What did you expect to happen?"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: "What actually happened? Paste the error message verbatim if there is one."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: "Server logs, browser console output, or stack trace. Use ``` fenced code blocks."
      render: shell
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: "Output of `npx theokit info` (full). Includes Node version, OS, package versions."
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I'm on the latest TheoKit version that exposes the bug (or I've stated which version I'm on).
          required: true
